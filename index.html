<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Thing Explainer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
    <h1>Thing Explainer</h1>
    <div class="counter">
      <span class="count-ok" id="countOk">0</span> erlaubt
      <span class="sep">·</span>
      <span class="count-bad" id="countBad">0</span> verboten
    </div>
  </header>
  <main>
    <div class="editor-wrap">
      <div id="backdrop" aria-hidden="true"></div>
      <textarea id="input" placeholder="Tippe deine Erklaerung hier ..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
